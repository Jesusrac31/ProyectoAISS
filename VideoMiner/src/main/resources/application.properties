spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto= update

spring.h2.console.enabled=true
# default path: h2-console
spring.h2.console.path=/h2-ui

# Ensure the db is created before populating it
#spring.jpa.defer-datasource-initialization=true

spring.jpa.properties.hibernate.event.merge.entity_copy_observer=allow
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Deacivate default route
springdoc.swagger-ui.disable-swagger-default-url=true

# 1. Adding videominer
springdoc.swagger-ui.urls[0].name=Videominer API
springdoc.swagger-ui.urls[0].url=/v3/api-docs

# 2. Added Peertube (pointing to the root in Gateway)
springdoc.swagger-ui.urls[1].name=Peertube API
springdoc.swagger-ui.urls[1].url=/docs/peertube/v3/api-docs

# 3. Added Dailymotion
springdoc.swagger-ui.urls[2].name=Dailymotion API
springdoc.swagger-ui.urls[2].url=/docs/dailymotion/v3/api-docs